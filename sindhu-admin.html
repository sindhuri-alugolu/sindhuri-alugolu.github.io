<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Edit Portfolio — Sindhuri</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc; --surface: #fff; --border: #e2e8f0;
      --text: #0f172a; --muted: #64748b; --accent: #0f766e;
      --accent-light: #14b8a6; --danger: #dc2626; --radius: 12px; --bar-h: 76px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.55; padding-bottom: calc(var(--bar-h) + 2rem); }
    .page-header { background: linear-gradient(135deg, #0f172a, #134e4a); color: #fff; padding: 2rem 1.25rem 1.75rem; text-align: center; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }
    .page-header p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.35rem; }
    .content { max-width: 680px; margin: 0 auto; padding: 1.25rem; }
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
    .section-head { display: flex; align-items: center; gap: 0.65rem; padding: 1rem 1.15rem; font-size: 1rem; font-weight: 700; background: #f8fafc; border-bottom: 1px solid var(--border); }
    .section-head i { color: var(--accent); width: 20px; text-align: center; }
    .section-body { padding: 1.15rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; }
    input, textarea { width: 100%; padding: 0.7rem 0.85rem; border: 1.5px solid var(--border); border-radius: 10px; font-size: 1rem; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent-light); box-shadow: 0 0 0 3px rgba(20,184,166,0.15); }
    textarea { min-height: 90px; resize: vertical; }
    .item-card { background: #f8fafc; border: 1.5px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 0.85rem; }
    .item-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .item-card-head span { font-weight: 700; font-size: 0.85rem; color: var(--accent); }
    .remove-btn { background: #fef2f2; color: var(--danger); border: none; border-radius: 8px; padding: 0.4rem 0.65rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .add-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.75rem; border: 2px dashed var(--border); border-radius: 10px; background: transparent; color: var(--accent); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 0.5rem; }
    .add-btn:hover { border-color: var(--accent-light); background: #f0fdfa; }
    .simple-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .simple-row input { flex: 1; }
    .simple-row button { background: #fef2f2; color: var(--danger); border: none; border-radius: 8px; padding: 0 0.75rem; cursor: pointer; font-size: 1rem; }
    .action-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bar-h); background: var(--surface); border-top: 1px solid var(--border); box-shadow: 0 -8px 30px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; gap: 0.75rem; padding: 0 1.25rem; z-index: 100; }
    .action-btn { flex: 1; max-width: 220px; display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.9rem 1.25rem; border-radius: 12px; font-size: 1rem; font-weight: 700; border: none; cursor: pointer; font-family: inherit; }
    .btn-save { background: var(--accent); color: #fff; }
    .btn-preview { background: #fff; color: var(--accent); border: 2px solid var(--accent) !important; }
    .toast { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%) translateY(-20px); background: #0f766e; color: #fff; padding: 0.85rem 1.5rem; border-radius: 999px; font-size: 0.9rem; opacity: 0; transition: all 0.35s; z-index: 200; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .loading { text-align: center; padding: 3rem; color: var(--muted); }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>Edit My Portfolio</h1>
    <p>Make your changes, then tap Save or Preview</p>
  </header>
  <div class="content" id="editor"><p class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</p></div>
  <div class="action-bar">
    <button type="button" class="action-btn btn-save" id="saveBtn"><i class="fas fa-check"></i> Save</button>
    <button type="button" class="action-btn btn-preview" id="previewBtn"><i class="fas fa-eye"></i> Preview</button>
  </div>
  <div class="toast" id="toast"></div>
  <script src="js/resume-data.js"></script>
  <script src="js/resume-store.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
