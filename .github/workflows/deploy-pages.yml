name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: https://sindhuri-alugolu.github.io
          NEXT_PUBLIC_GITHUB_REPO: sindhuri-alugolu/sindhuri-alugolu.github.io
          NEXT_PUBLIC_ADMIN_PIN: ${{ secrets.ADMIN_PIN }}
          NEXT_PUBLIC_GITHUB_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
